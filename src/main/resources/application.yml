spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/library
    username: postgres
    password: postgres_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect



logging:
  file:
    name: application.log
  level:
    root: warn
    io:
      github:
        cursodsousa: trace
    org:
      springFramework:
        web: debug

management:
  server:
    port: 9090
  endpoints:
    web:
      exposure:
        include: "*"